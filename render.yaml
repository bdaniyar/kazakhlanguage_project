# Render Blueprint: https://render.com/docs/blueprint-spec
# Монорепо: API — каталог backend/

services:
  - type: web
    name: jansaqta-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
